<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventario | ADVITIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inventario.css">
</head>
<body>
    
    <div id="navbar-container"></div>

    <main class="main-container">
        <div class="card-panel">
            <h1 class="titulo-pagina">Inventario</h1>
            
            <details class="registrar-producto-details">
                <summary><h2>Registrar producto</h2></summary>
                <form action="">
                    <div>
                        <label for="nombre" >Nombre del producto: </label>
                        <input type="text" name="nombre" id="nombre" >
                    </div>
                    <div>
                        <label for="categoria">Categoria: </label>
                        <input type="text" name="categoria" id="categoria">
                    </div>
                    <div>
                        <label for="proveedor">Proveedor: </label>
                        <input type="text" name="proveedor" id="proveedor">
                    </div>
                    <div>
                        <label for="stock">Stock actual: </label>
                        <input type="number" name="stock" id="stock">
                    </div>
                    <div>
                        <label for="precio">Precio: </label>
                        <input type="number" name="precio" id="precio">
                    </div>
                    <button type="submit">Guardar</button>
                </form>
            </details>

            <h2>Lista de productos</h2>

            <div class="search-container">  
                <button type="submit" id="search-button">  </button>
                <input type="text" name="buscar" id="busqueda" placeholder="Buscar producto...">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Categoria</th>
                        <th>Descripcion</th>
                        <th>Proveedor</th>
                        <th>Stock</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                       <td data-label="ID">1</td>
        <td data-label="Nombre">Laptop</td>
        <td data-label="Categoria">Electronica</td>
        <td data-label="Descripcion">Gamer</td>
        <td data-label="Proveedor">DDTech</td>
        <td data-label="Stock">15</td>
        <td data-label="Precio">$10500</td>
        <td data-label="Acciones">
            <button>Editar</button>
            <button>Eliminar</button>
        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Multimetro</td>
                        <td>Electronica</td>
                        <td>Escolar</td>
                        <td>Telmedia</td>
                        <td>23</td>
                        <td>$299</td>
                        <td>
                            <button>Editar</button>
                            <button>Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        fetch('navbar.html')
        .then(response => response.text())
        .then( data => {
            document.getElementById('navbar-container').innerHTML = data;
            const links = document.querySelectorAll('nav ul li a');
            links.forEach(link => {
                if(link.textContent.trim() === 'Inventario') {
                    link.classList.add('active-link');
                }
            });
        })    
        .catch(error => console.error("Error al cargar el navbar", error))
    </script>

</body>
</html>
