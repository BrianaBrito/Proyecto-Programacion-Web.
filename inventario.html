<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
</head>
<body>
    
    <h1>Inventario</h1>
    <h2>Registrar producto</h2>

    <form action="">

        <div>
            <label for="nombre">Nombre del producto: </label>
            <input type="text" name="nombre" id="nombre">
        </div>

        <br>

        <div>
            <label for="categoria">Categoria: </label>
            <input type="text" name="categoria" id="categoria">
        </div>

        <br>

        <div>
            <label for="proveedor">Proveedor: </label>
            <input type="text" name="proveedor" id="proveedor">
        </div>

        <br>

        <div>
            <label for="stock">Stock actual: </label>
            <input type="number" name="stock" id="categoria">
        </div>

        <br>

        <div>
            <label for="precio">Precio: </label>
            <input type="number" name="precio" id="precio">
        </div>

        <br>

        <button type="submit">Guardar</button>


    </form>

    <h2>Lista de productos</h2>

    <div>
        <button type="submit"> <img src="https://cdn-icons-png.flaticon.com/512/3721/3721746.png" alt="Lupa" style="width: 15px; height: 15px;"> </button>
        <input type="text" name="buscar" id="busqueda" placeholder="Producto ...">
    </div>

    <br>


    <table border="5px">

        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Categoria</th>
                <th>Descripcion</th>
                <th>Proveedor</th>
                <th>Stock</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Laptop</td>
                <td>Electronica</td>
                <td>Gamer</td>
                <td>DDTech</td>
                <td>15</td>
                <td>$10500</td>
                <td>
                    <button>Editar</button>
                    <button>Eliminar</button>
                </td>
            </tr>
            
            <tr>
                <td>2</td>
                <td>Multimetro</td>
                <td>Electronica</td>
                <td>Escolar</td>
                <td>Telmedia</td>
                <td>23</td>
                <td>$299</td>
                <td>
                    <button>Editar</button>
                    <button>Eliminar</button>
                </td>
            </tr>
        </tbody>

    </table>


</body>
</html>
